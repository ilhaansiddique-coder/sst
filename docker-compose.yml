services:
  postgres:
    image: postgres:16-alpine
    container_name: sst-postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/postgres-init.sql:/docker-entrypoint-initdb.d/01-postgres-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sst-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: sst-clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./db/clickhouse-init.sql:/docker-entrypoint-initdb.d/01-clickhouse-init.sql:ro

  api:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CLICKHOUSE_URL: http://clickhouse:8123
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      APP_URL: ${APP_URL}
      API_URL: http://api:3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_started
    ports:
      - "3001:3001"

  event-processor:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: ./apps/event-processor/Dockerfile
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      CLICKHOUSE_URL: http://clickhouse:8123
      API_URL: http://api:3001/api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_started
    ports:
      - "3002:3002"

  frontend:
    profiles: ["apps"]
    build:
      context: .
      dockerfile: ./apps/frontend/Dockerfile
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
    depends_on:
      api:
        condition: service_started
    ports:
      - "3000:3000"

  nginx:
    profiles: ["apps"]
    image: nginx:alpine
    depends_on:
      frontend:
        condition: service_started
      api:
        condition: service_started
      event-processor:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
